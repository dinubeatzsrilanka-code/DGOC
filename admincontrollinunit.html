<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiNu Group - Admin Controlling Unit</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at top, #0f1220 0%, #03050a 100%); color: #fff; font-family: 'Rajdhani', sans-serif; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { font-family: 'Orbitron'; color: #00b4d8; margin-bottom: 30px; text-shadow: 0 0 15px rgba(0, 180, 216, 0.4); text-align: center; letter-spacing: 2px; font-size: 26px; }
        
        .login-gate { background: rgba(15, 23, 42, 0.8); border: 2px solid #ff0055; border-radius: 12px; padding: 35px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 0 30px rgba(255,0,85,0.25); margin-top: 80px; backdrop-filter: blur(8px); }
        .pin-input { width: 100%; background: #0b0f19; border: 1px solid rgba(255, 0, 85, 0.5); padding: 12px; color: #fff; text-align: center; font-size: 22px; font-family: 'Orbitron'; margin: 20px 0; border-radius: 6px; letter-spacing: 5px; }
        .login-btn { width: 100%; background: linear-gradient(90deg, #ff0055, #ff007f); border: none; padding: 14px; color: white; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s; }
        .login-btn:hover { box-shadow: 0 0 20px #ff0055; }
        
        .admin-dashboard { display: none; width: 100%; max-width: 850px; animation: fadeIn 0.8s ease; }
        
        .order-card { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(0, 180, 216, 0.25); border-radius: 12px; padding: 25px; margin-bottom: 25px; display: grid; grid-template-columns: 1.16fr 1fr; gap: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); backdrop-filter: blur(5px); transition: 0.3s; }
        .order-card:hover { border-color: rgba(0, 180, 216, 0.6); box-shadow: 0 0 25px rgba(0, 180, 216, 0.15); }
        
        .client-info h3 { font-family: 'Orbitron'; color: #ff007f; font-size: 20px; text-shadow: 0 0 10px rgba(255,0,127,0.3); margin-bottom: 12px; }
        .client-info p { font-size: 16px; margin-bottom: 6px; color: #cbd5e0; }
        .client-info p b { color: #00b4d8; font-weight: 500; font-family: 'Orbitron'; font-size: 12px; display: inline-block; width: 95px; }
        
        .control-group { margin-bottom: 10px; text-align: left; }
        .control-group label { font-size: 11px; color: #00b4d8; font-family: 'Orbitron'; letter-spacing: 1px; display: block; margin-bottom: 4px; }
        
        .select-input, .text-input { width: 100%; background: #0b0f19; border: 1px solid rgba(0,180,216,0.3); padding: 8px; color: #fff; font-family: 'Rajdhani'; font-size: 15px; border-radius: 6px; transition: 0.3s; }
        .select-input:focus, .text-input:focus { outline: none; border-color: #00b4d8; box-shadow: 0 0 10px rgba(0,180,216,0.3); }
        
        .courier-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-group { display: flex; gap: 12px; margin-top: 15px; }
        .save-btn { background: linear-gradient(90deg, #00b4d8, #0077b6); color: #fff; border: none; padding: 12px; cursor: pointer; flex: 2; font-family: 'Orbitron'; font-weight: bold; border-radius: 6px; transition: 0.3s; }
        .save-btn:hover { box-shadow: 0 0 15px #00b4d8; }
        
        .del-btn { background: none; border: 1px solid #ff0055; color: #ff0055; padding: 12px; cursor: pointer; flex: 1; font-family: 'Orbitron'; font-weight: bold; border-radius: 6px; transition: 0.3s; }
        .del-btn:hover { background: #ff0055; color: #fff; box-shadow: 0 0 15px #ff0055; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="login-gate" id="loginGate">
        <h3 style="font-family: 'Orbitron'; color: #ff0055;">🔒 ADMINISTRATIVE LOCKWAY</h3>
        <input type="password" id="adminPin" class="pin-input" placeholder="••••">
        <button class="login-btn" onclick="checkPIN()">AUTHORIZE MODULE</button>
        <p id="errorMsg" style="color:#ff0055; margin-top:12px; display:none; font-family:Orbitron; font-size:12px; font-weight: bold;">🛑 ACCESS DENIED: INVALID PIN MATRIX</p>
    </div>

    <div class="admin-dashboard" id="adminDashboard">
        <h1>DIŇU GROUP - ADMIN MASTER OVERRIDE</h1>
        <div id="ordersBox"></div>
    </div>

    <script>
        const PIN_CODE = "201003101475"; 

        function checkPIN() {
            var input = document.getElementById('adminPin').value;
            if(input === PIN_CODE) {
                document.getElementById('loginGate').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                loadOrders();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('adminPin').value = "";
            }
        }

        function loadOrders() {
            var orders = JSON.parse(localStorage.getItem('dinu_orders') || '[]');
            var box = document.getElementById('ordersBox');
            box.innerHTML = "";
            if(orders.length === 0) { box.innerHTML = "<p style='text-align:center; color:#64748b; font-family:Orbitron; padding: 40px; border: 1px dashed rgba(100,116,139,0.3); border-radius:8px;'>NO ACTIVE PROJECT PIPELINES IN SYSTEM MEMORY.</p>"; return; }

            orders.forEach((o, index) => {
                var card = document.createElement('div');
                card.className = "order-card";
                card.innerHTML = `
                    <div class="client-info">
                        <h3>NODE ID: ${o.id}</h3>
                        <p><b>CLIENT:</b> ${o.name}</p>
                        <p><b>CONTACT:</b> ${o.phone}</p>
                        <p><b>ADDRESS:</b> ${o.billing}</p>
                        <p><b>GRID LOC:</b> ${o.service}</p>
                        <p><b>JOB MATRIX:</b> ${o.desc}</p>
                        <p><b>NOTES:</b> ${o.notes || 'None'}</p>
                        <p style="margin-top:8px; font-family:'Orbitron'; font-size: 14px;"><b>LIVE COST:</b> <span style="color:#00b4d8; font-weight:bold;">${o.cost ? (isNaN(o.cost) ? o.cost : "LKR " + parseFloat(o.cost).toLocaleString()) : 'Pending'}</span></p>
                        ${o.courierId ? `<p style="font-size:13px; color:#ff007f; margin-top:5px;"><b>COURIER:</b> ${o.courierName} (${o.courierId})</p>` : ''}
                    </div>
                    <div>
                        <div class="control-group">
                            <label>UPDATE MATRIX STATUS</label>
                            <select class="select-input" id="status-${o.id}">
                                <option value="PENDING REVIEW" ${o.status=='PENDING REVIEW'?'selected':''}>PENDING REVIEW</option>
                                <option value="PROCESSING" ${o.status=='PROCESSING'?'selected':''}>PROCESSING</option>
                                <option value="PACKING" ${o.status=='PACKING'?'selected':''}>PACKING</option>
                                <option value="DELIVERING" ${o.status=='DELIVERING'?'selected':''}>DELIVERING</option>
                                <option value="SHIPPED TO COURIER" ${o.status=='SHIPPED TO COURIER'?'selected':''}>SHIPPED TO COURIER</option>
                                <option value="PROJECT COMPLETED" ${o.status=='PROJECT COMPLETED'?'selected':''}>PROJECT COMPLETED</option>
                            </select>
                        </div>
                        
                        <div class="control-group">
                            <label>ESTIMATED COST (LKR)</label>
                            <input type="text" class="text-input" id="cost-${o.id}" value="${o.cost || ''}" placeholder="EX: 45000">
                        </div>

                        <div class="courier-grid">
                            <div class="control-group">
                                <label>COURIER COMPANY</label>
                                <input type="text" class="text-input" id="cName-${o.id}" value="${o.courierName || ''}" placeholder="EX: Domex">
                            </div>
                            <div class="control-group">
                                <label>TRACKING WAYBILL ID</label>
                                <input type="text" class="text-input" id="cId-${o.id}" value="${o.courierId || ''}" placeholder="EX: DX12345">
                            </div>
                        </div>

                        <div class="control-group">
                            <label>COURIER WEBSITE URL</label>
                            <input type="text" class="text-input" id="cWeb-${o.id}" value="${o.courierWeb || ''}" placeholder="EX: domex.lk">
                        </div>

                        <div class="control-group">
                            <label>IMAGE NAME / LINK</label>
                            <input type="text" class="text-input" id="img-${o.id}" value="${o.photo || ''}" placeholder="pic1.jpg">
                        </div>
                        
                        <div class="btn-group">
                            <button class="save-btn" onclick="updateOrder('${o.id}')">SAVE DATA</button>
                            <button class="del-btn" onclick="deleteOrder(${index})">X</button>
                        </div>
                    </div>
                `;
                box.appendChild(card);
            });
        }

        function updateOrder(id) {
            var orders = JSON.parse(localStorage.getItem('dinu_orders') || '[]');
            var order = orders.find(o => o.id === id);
            if(order) {
                order.status = document.getElementById('status-' + id).value;
                order.photo = document.getElementById('img-' + id).value;
                
                var costVal = document.getElementById('cost-' + id).value.trim();
                order.cost = costVal ? costVal : "Pending Valuation";
                
                order.courierName = document.getElementById('cName-' + id).value.trim();
                order.courierId = document.getElementById('cId-' + id).value.trim();
                order.courierWeb = document.getElementById('cWeb-' + id).value.trim();
                
                localStorage.setItem('dinu_orders', JSON.stringify(orders));
                alert("Matrix Node " + id + " update successfully deployed!");
                loadOrders();
            }
        }

        function deleteOrder(index) {
            var response = confirm("Are you sure you want to permanently erase this order node from reality?");
            if (response == true) {
                var orders = JSON.parse(localStorage.getItem('dinu_orders') || '[]');
                orders.splice(index, 1); 
                localStorage.setItem('dinu_orders', JSON.stringify(orders));
                loadOrders(); 
            }
        }
    </script>
</body>
</html>
